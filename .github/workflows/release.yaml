name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  metadata:
    name: Parse Release Metadata
    if: github.repository == 'KvalitetsIT/kitapp-helm-chart'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.parse.outputs.version }}
      prerelease: ${{ steps.parse.outputs.prerelease }}
    steps:
      - id: parse
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          version="${TAG_NAME#v}"
          prerelease=false
          if [[ "${version}" == *-* ]]; then
            prerelease=true
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

  helm:
    name: Publish Helm Chart
    if: github.repository == 'KvalitetsIT/kitapp-helm-chart'
    runs-on: ubuntu-latest
    needs:
      - metadata
    permissions:
      contents: read
      id-token: write # Required for trusted publishing of Helm artifacts.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        name: Setup Helm
        with:
          version: "v3.17.0"

      - name: Update Chart Dependencies
        run: helm dependency update charts/kitapp

      - name: Build Chart
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
        run: helm package charts/kitapp --version "${VERSION}" --app-version "${VERSION}"

      - name: Configure Git
        run: |
          git config --global user.name "Github Actions"
          git config --global user.email "development@kvalitetsit.dk"

      - name: Checkout Helm repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: KvalitetsIT/helm-repo
          token: ${{ secrets.KIT_GITHUB_ACCESS }}
          path: helm-repo
          persist-credentials: false

      - name: Publish chart
        env:
          TAG: ${{ needs.metadata.outputs.version }}
          KIT_GITHUB_ACCESS: ${{ secrets.KIT_GITHUB_ACCESS }}
        run: |
          set -euo pipefail
          mkdir -p helm-repo/kitapp
          cp kitapp-*.tgz helm-repo/kitapp/
          cd helm-repo
          git remote set-url origin "https://${KIT_GITHUB_ACCESS}:x-oauth-basic@github.com/KvalitetsIT/helm-repo"
          helm repo index . --url https://raw.githubusercontent.com/KvalitetsIT/helm-repo/master/
          git add -A
          git commit -m "chore: release kitapp chart v${TAG}" || exit 0
          git push

  github-release:
    name: Create GitHub Release
    if: github.repository == 'KvalitetsIT/kitapp-helm-chart'
    needs:
      - helm
      - metadata
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create the GitHub release for the tag.
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ needs.metadata.outputs.version }}
          prerelease: ${{ needs.metadata.outputs.prerelease == 'true' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
