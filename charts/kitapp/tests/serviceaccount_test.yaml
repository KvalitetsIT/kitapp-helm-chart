suite: test serviceaccount
templates:
  - templates/serviceaccount.yaml
set:
  image.repository: ghcr.io/example/app
  image.tag: v1.0.0

tests:
  - it: should not render by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render ServiceAccount when enabled
    set:
      serviceAccount.create: true
    asserts:
      - isKind:
          of: ServiceAccount

  - it: should use the release name as the ServiceAccount name by default
    set:
      serviceAccount.create: true
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME
