replicaCount: 1

image:
  repository: nginx
  tag: "1.31.0"

env:
  - name: EXAMPLE
    value: hello

applicationPort:
  name: http
  port: 8000
  protocol: TCP

additionalApplicationPorts:
  - name: grpc
    port: 9095
    protocol: TCP

servicePort:
  port: 8000

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 20

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
