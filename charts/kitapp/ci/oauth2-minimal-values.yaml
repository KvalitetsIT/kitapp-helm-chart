image:
  repository: ghcr.io/your-org/your-app
  tag: "1.31.0"

applicationPort:
  name: http
  port: 8000

servicePort:
  port: 8000

oauth2:
  enabled: true
  secretRef: my-app-oauth2-proxy-envs
  clientId: portal
  issuerUrl: https://issuer.example.com/realms/portal

gateway:
  enabled: true
  hostnames:
    - my-app.example.com
  gateway:
    name: ingressgateway
    namespace: istio-ingress
  clusterIssuer: letsencrypt-prod-istio
