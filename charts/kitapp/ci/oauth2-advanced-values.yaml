image:
  repository: ghcr.io/your-org/your-app
  tag: "1.31.0"

applicationPort:
  name: http
  port: 8000

servicePort:
  port: 8000

oauth2:
  enabled: true
  secretRef: my-app-oauth2-proxy-envs
  image: ghcr.io/oauth2-proxy/oauth2-proxy:v7.15.0
  upstream: http://127.0.0.1:8000
  clientId: portal
  issuerUrl: https://issuer.example.com/realms/portal
  config:
    http_address: 0.0.0.0:4180
    oidc_extra_audiences:
      - portal
      - admin
    email_domains:
      - example.com
    allowed_groups:
      - admins
    skip_auth_routes:
      - ^/healthz$
  sidecar:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  providerCA:
    configMap: oidc-provider-ca
    key: ca.crt

gateway:
  routes:
    app:
      httpRoute:
        hostnames:
          - my-app.example.com
        rules:
          - backendRefs:
              - name: my-app
                port: 4180
