image:
  repository: docker.io/mccutchen/go-httpbin
  tag: "2.23.0"

applicationPort:
  port: 8080

route:
  enabled: true
  hostnames:
    - app.example.com

oauth2:
  enabled: true
  realm: my-realm
  clientId: my-app
  keycloakUrl: https://keycloak.example.com
  # issuerUrl auto-constructed as https://keycloak.example.com/realms/my-realm
  # secretRef auto-derived as <release>-keycloak-client
