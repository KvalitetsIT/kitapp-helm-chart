# -- Override the chart name used for resource naming.
# @default -- ""
# @section -- Naming
nameOverride: ""

# -- Fully override the generated full resource name.
# @default -- ""
# @section -- Naming
fullnameOverride: ""

# -- Number of pod replicas.
# @default -- 1
# @section -- Deployment
replicaCount: 1

# -- Deployment strategy configuration.
# @default -- see values.yaml
# @section -- Deployment
strategy:
  # -- Deployment strategy type.
  # @default -- RollingUpdate
  # @section -- Deployment
  type: RollingUpdate

# -- Container image settings.
# @default -- see values.yaml
# @section -- Image
image:
  # -- Container image repository (required).
  # @default -- ""
  # @section -- Image
  repository: ""
  # -- Container image tag (required).
  # @default -- ""
  # @section -- Image
  tag: ""
  # -- Image pull policy.
  # @default -- IfNotPresent
  # @section -- Image
  pullPolicy: IfNotPresent

# -- Optional list of image pull secrets.
# @default -- []
# @section -- Image
imagePullSecrets: []

# -- Primary application port exposed by the container and Service.
# @default -- see values.yaml
# @section -- Ports
applicationPort:
  # -- Primary application port name.
  # @default -- http
  # @section -- Ports
  name: http
  # -- Primary application container port.
  # If empty, falls back to servicePort.
  # @default -- null
  # @section -- Ports
  port: null
  # -- Primary application protocol.
  # @default -- TCP
  # @section -- Ports
  protocol: TCP

# -- Additional named application ports exposed on both container and Service.
# Each item supports name, port, and optional protocol.
# @default -- []
# @section -- Ports
additionalApplicationPorts: []

# -- Primary Service port exposed by the Service.
# @default -- see values.yaml
# @section -- Ports
servicePort:
  # -- Primary Service port name. If empty, falls back to applicationPort.name.
  # @default -- null
  # @section -- Ports
  name: null
  # -- Primary Service port number. If empty, falls back to applicationPort.port.
  # @default -- null
  # @section -- Ports
  port: null
  # -- Primary Service protocol. If empty, falls back to applicationPort.protocol.
  # @default -- null
  # @section -- Ports
  protocol: null

# -- Additional Service-only ports. Each item supports `name`, `port`, optional `targetPort`, and optional `protocol`.
# If `targetPort` is omitted, it defaults to the same value as `port`.
# @default -- []
# @section -- Ports
additionalServicePorts: []

# -- Optional container command override.
# @default -- []
# @section -- Runtime
command: []

# -- Optional container args override.
# @default -- []
# @section -- Runtime
args: []

# -- Environment variables for the container.
# @default -- []
# @section -- Runtime
env: []

# -- Additional environment variables appended after `env`.
# Useful for overlay values files to extend env without replacing shared base entries.
# @default -- []
# @section -- Runtime
additionalEnvs: []

# -- Environment variable sources (ConfigMapRef/SecretRef) for the container.
# @default -- []
# @section -- Runtime
envFrom: []

# -- Container resource requests and limits.
# @default -- {}
# @section -- Runtime
resources: {}

# -- Kubernetes liveness probe.
# @default -- {}
# @section -- Health
livenessProbe: {}

# -- Kubernetes readiness probe.
# @default -- {}
# @section -- Health
readinessProbe: {}

# -- Kubernetes startup probe.
# @default -- {}
# @section -- Health
startupProbe: {}

# -- OAuth2 proxy injector integration.
# Adds required pod label and annotations for the KvalitetsIT oauth2-proxy-injector webhook.
# @default -- see values.yaml
# @section -- OAuth2
oauth2:
  # -- Enable oauth2-proxy sidecar injection metadata on the pod.
  # @default -- false
  # @section -- OAuth2
  enabled: false
  # -- Optional oauth2-proxy image override. Renders injector annotation `oauth2-proxy.kitkube.dk/image`.
  # @default -- ""
  # @section -- OAuth2
  image: ""
  # -- Dedicated upstream URL for oauth2-proxy. This is always used for `upstreams` in oauth2-proxy.cfg.
  # @default -- http://127.0.0.1:8080
  # @section -- OAuth2
  upstream: http://127.0.0.1:8080
  # -- Reusable oauth2-proxy client id used by generated oauth2-proxy.cfg (`client_id`, `cookie_name`).
  # @default -- ""
  # @section -- OAuth2
  clientId: ""
  # -- Reusable oauth2-proxy issuer URL used by generated oauth2-proxy.cfg (`oidc_issuer_url`).
  # @default -- ""
  # @section -- OAuth2
  issuerUrl: ""
  # -- oauth2-proxy.cfg override values map.
  # Defaults are defined in the oauth2 configmap template; values set here override those defaults.
  # Values are appended after defaults, so duplicate keys override earlier ones.
  # @default -- {}
  # @section -- OAuth2
  config: {}
  # -- Existing Secret name referenced by injector annotation (required when oauth2.enabled=true).
  # @default -- ""
  # @section -- OAuth2
  secretRef: ""
  # -- Optional sidecar resource annotation settings.
  # @default -- see values.yaml
  # @section -- OAuth2
  sidecar:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  # -- Optional provider CA annotation settings.
  # @default -- see values.yaml
  # @section -- OAuth2
  providerCA:
    configMap: ""
    key: ""
  overrides:
    # -- Optional injector annotations merged into pod annotations when oauth2.enabled=true.
    # Use for advanced injector keys (for example oauth2-proxy.kitkube.dk/image, sidecar resources, provider CA settings).
    # @default -- {}
    # @section -- OAuth2
    annotations: {}

# -- Extra labels to add to the pod.
# @default -- {}
# @section -- Pod Metadata
podLabels: {}

# -- Extra pod annotations.
# @default -- {}
# @section -- Pod Metadata
podAnnotations: {}

# -- Metrics settings for optional metrics port and ServiceMonitor.
# @default -- see values.yaml
# @section -- Metrics
metrics:
  # -- Enable metrics port exposure on container and Service.
  # The metrics port name is always `metrics` when enabled.
  # @default -- false
  # @section -- Metrics
  enabled: false
  # -- Metrics port number. If empty, uses applicationPort.port.
  # @default -- null
  # @section -- Metrics
  port: null
  # -- Metrics scrape path.
  # @default -- /metrics
  # @section -- Metrics
  path: /metrics
  # -- ServiceMonitor scrape interval.
  # @default -- 30s
  # @section -- Metrics
  interval: 30s
  # -- Extra labels for the ServiceMonitor (when metrics.enabled=true and ServiceMonitor CRD is installed).
  # @default -- {}
  # @section -- Metrics
  labels: {}
  # -- Extra annotations for the ServiceMonitor (when metrics.enabled=true and ServiceMonitor CRD is installed).
  # @default -- {}
  # @section -- Metrics
  annotations: {}

# -- Service account settings.
# @default -- see values.yaml
# @section -- Security
serviceAccount:
  # -- Create a dedicated ServiceAccount.
  # @default -- true
  # @section -- Security
  create: true
  # -- Existing ServiceAccount name to use (or generated when empty and create=true).
  # @default -- ""
  # @section -- Security
  name: ""
  # -- Annotations for the ServiceAccount.
  # @default -- {}
  # @section -- Security
  annotations: {}

# -- Security context applied to the pod (e.g. fsGroup, runAsUser, runAsGroup).
# @default -- {}
# @section -- Security
podSecurityContext: {}

# -- Security context applied to the application container.
# @default -- {}
# @section -- Security
containerSecurityContext: {}

# -- Service settings for exposing the application.
# @default -- see values.yaml
# @section -- Service
service:
  # -- Kubernetes Service type.
  # @default -- ClusterIP
  # @section -- Service
  type: ClusterIP
  # -- Annotations for the Service.
  # @default -- {}
  # @section -- Service
  annotations: {}

# -- Raw container volume mounts.
# Typical PVC mount example:
# - name: app-data
#   mountPath: /data
# @default -- []
# @section -- Persistence
volumeMounts: []

# -- Raw pod volumes.
# Typical PVC volume example:
# - name: app-data
#   persistentVolumeClaim:
#     claimName: my-existing-pvc
# @default -- []
# @section -- Persistence
volumes: []

# -- Values passed to the KvalitetsIT templates dependency chart.
# @default -- {}
# @section -- Dependencies
templates: {}

# -- Gateway API integration settings.
# @default -- see values.yaml
# @section -- Gateway
gateway:
  # -- Enable Gateway API resources (HTTPRoute, ListenerSet, and optional policies).
  # @default -- false
  # @section -- Gateway
  enabled: false

  # -- Public hostname(s) for the HTTPRoute and ListenerSet.
  # The first hostname is also used to auto-populate oauth2-proxy redirect_url.
  # @default -- []
  # @section -- Gateway
  hostnames: []

  # -- Backend port for the auto-generated catch-all rule.
  # Defaults to applicationPort.port, or 4180 when oauth2.enabled=true.
  # @default -- null
  # @section -- Gateway
  port: null

  # -- Gateway attachment settings.
  # @default -- see values.yaml
  # @section -- Gateway
  gateway:
    # -- Name of the Gateway to attach to.
    # @default -- ingressgateway
    # @section -- Gateway
    name: ingressgateway
    # -- Namespace of the Gateway.
    # @default -- istio-ingress
    # @section -- Gateway
    namespace: istio-ingress
    # -- If set, skip ListenerSet creation and attach the HTTPRoute directly to this Gateway listener section.
    # @default -- ""
    # @section -- Gateway
    sectionName: ""

  # -- Cert-manager ClusterIssuer for auto-TLS on the ListenerSet.
  # @default -- letsencrypt-prod-istio
  # @section -- Gateway
  clusterIssuer: letsencrypt-prod-istio

  # -- Explicit HTTPRoute rules. If empty, a catch-all rule to the app Service is generated.
  # @default -- []
  # @section -- Gateway
  rules: []

  # -- Istio AuthorizationPolicy resources keyed by name.
  # Supports IP-based (remoteIpBlocks), path-based, and source-identity (principals) rules.
  # @default -- {}
  # @section -- Gateway
  authorizationPolicies: {}

  # -- Istio RequestAuthentication resources keyed by name.
  # Use to require and validate JWTs from an OIDC provider (e.g. Keycloak).
  # @default -- {}
  # @section -- Gateway
  requestAuthentications: {}
