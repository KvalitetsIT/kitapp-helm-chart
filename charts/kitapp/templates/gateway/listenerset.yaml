{{- if and .Values.gateway.enabled (not .Values.gateway.gateway.sectionName) }}
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: {{ include "kitapp.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kitapp.labels" . | nindent 4 }}
  {{- with .Values.gateway.clusterIssuer }}
  annotations:
    cert-manager.io/cluster-issuer: {{ . | quote }}
  {{- end }}
spec:
  parentRef:
    name: {{ .Values.gateway.gateway.name | quote }}
    namespace: {{ .Values.gateway.gateway.namespace | quote }}
    kind: Gateway
    group: gateway.networking.k8s.io
  listeners:
    {{- range $i, $hostname := .Values.gateway.hostnames }}
    - name: {{ ternary "https" (printf "https-%d" $i) (eq $i 0) | quote }}
      hostname: {{ $hostname | quote }}
      protocol: HTTPS
      port: 443
      allowedRoutes:
        namespaces:
          from: Same
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: {{ $hostname | quote }}
            namespace: {{ $.Release.Namespace | quote }}
    {{- end }}
{{- end }}
