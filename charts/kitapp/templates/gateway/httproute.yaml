{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "kitapp.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kitapp.labels" . | nindent 4 }}
spec:
  parentRefs:
    {{- if .Values.gateway.gateway.sectionName }}
    - name: {{ .Values.gateway.gateway.name | quote }}
      namespace: {{ .Values.gateway.gateway.namespace | quote }}
      kind: Gateway
      group: gateway.networking.k8s.io
      sectionName: {{ .Values.gateway.gateway.sectionName | quote }}
    {{- else }}
    - name: {{ include "kitapp.fullname" . | quote }}
      kind: ListenerSet
      group: gateway.networking.k8s.io
    {{- end }}
  hostnames:
    {{- range .Values.gateway.hostnames }}
    - {{ . | quote }}
    {{- end }}
  rules:
    {{- if .Values.gateway.rules }}
    {{- toYaml .Values.gateway.rules | nindent 4 }}
    {{- else }}
    - backendRefs:
        - group: ""
          kind: Service
          name: {{ include "kitapp.fullname" . | quote }}
          port: {{ include "kitapp.gateway.resolvedPort" . }}
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
    {{- end }}
{{- end }}
