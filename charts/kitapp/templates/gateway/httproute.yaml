{{- if .Values.route.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "kitapp.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kitapp.labels" . | nindent 4 }}
spec:
  parentRefs:
    {{- if .Values.route.gateway.sectionName }}
    - name: {{ .Values.route.gateway.name | quote }}
      namespace: {{ .Values.route.gateway.namespace | quote }}
      kind: Gateway
      group: gateway.networking.k8s.io
      sectionName: {{ .Values.route.gateway.sectionName | quote }}
    {{- else }}
    - name: {{ include "kitapp.fullname" . | quote }}
      kind: ListenerSet
      group: gateway.networking.k8s.io
    {{- end }}
  hostnames:
    {{- range .Values.route.hostnames }}
    - {{ . | quote }}
    {{- end }}
  rules:
    {{- if not .Values.route.exposeMetrics }}
    - matches:
        - path:
            type: PathPrefix
            value: /metrics
      backendRefs: []
    {{- end }}
    {{- with .Values.route.rules }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    - backendRefs:
        - group: ""
          kind: Service
          name: {{ include "kitapp.fullname" . | quote }}
          port: {{ include "kitapp.gateway.resolvedPort" . }}
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
{{- end }}
