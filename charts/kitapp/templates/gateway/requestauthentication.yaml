{{- if and .Values.route.enabled (eq .Values.route.type "HTTPRoute") }}
{{- range $authName, $auth := .Values.route.requestAuthentications }}
{{- if $auth }}
---
apiVersion: security.istio.io/v1
kind: RequestAuthentication
metadata:
  name: {{ printf "%s-%s" (include "kitapp.name" $) $authName | quote }}
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    {{- include "kitapp.labels" $ | nindent 4 }}
spec:
  targetRefs:
    - name: {{ include "kitapp.name" $ | quote }}
      kind: Service
      group: ""
  jwtRules:
    {{- toYaml $auth.jwtRules | nindent 4 }}
{{- end }}
{{- end }}
{{- end }}
