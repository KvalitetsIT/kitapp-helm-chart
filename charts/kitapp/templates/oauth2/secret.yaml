{{- if and .Values.oauth2.enabled .Values.oauth2.realm (not .Values.oauth2.secretRef) }}
{{- $secretName := include "kitapp.oauth2.effectiveSecretRef" . }}
{{- $publicClient := (.Values.oauth2.definition | default dict).publicClient | default false }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $existingData := ($existing.data | default dict) }}
{{- /* Preserve existing values across upgrades via lookup; generate stable randoms on first install. */}}
{{- $cookieSecret := index $existingData "OAUTH2_PROXY_COOKIE_SECRET" | default "" | b64dec }}
{{- if not $cookieSecret }}
{{- $cookieSecret = randAlphaNum 32 | b64enc }}
{{- end }}
{{- $clientSecret := "" }}
{{- if not $publicClient }}
{{- $clientSecret = index $existingData "OAUTH2_PROXY_CLIENT_SECRET" | default "" | b64dec }}
{{- if not $clientSecret }}
{{- $clientSecret = randAlphaNum 32 }}
{{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kitapp.labels" . | nindent 4 }}
type: Opaque
stringData:
  OAUTH2_PROXY_COOKIE_SECRET: {{ $cookieSecret | quote }}
  {{- if not $publicClient }}
  OAUTH2_PROXY_CLIENT_SECRET: {{ $clientSecret | quote }}
  {{- end }}
{{- end }}
